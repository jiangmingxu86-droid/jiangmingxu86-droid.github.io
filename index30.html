            }

                        <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>

        // ==================== 完全重写：智能搜索系统 ====================
        // 拼写纠错算法（Levenshtein距离）
        function levenshteinDistance(a, b) {
            const matrix = Array.from({ length: a.length + 1 }, () => 
                Array(b.length + 1).fill(0)
            );
            
            for (let i = 0; i <= a.length; i++) matrix[i][0] = i;
            for (let j = 0; j <= b.length; j++) matrix[0][j] = j;
            
            for (let i = 1; i <= a.length; i++) {
                for (let j = 1; j <= b.length; j++) {
                    const cost = a[i-1] === b[j-1] ? 0 : 1;
                    matrix[i][j] = Math.min(
                        matrix[i-1][j] + 1,     // 删除
                        matrix[i][j-1] + 1,     // 插入
                        matrix[i-1][j-1] + cost // 替换
                    );
                }
            }
            
            return matrix[a.length][b.length];
        }

        // 获取自动补全建议
        function getAutocompleteSuggestions(query) {
            const suggestions = new Set();
            const lowerQuery = query.toLowerCase();
            
            // 1. 工具名称建议
            aiTools.forEach(tool => {
                if (tool.name.toLowerCase().includes(lowerQuery)) {
                    suggestions.add(tool.name);
                }
            });
            
            // 2. 功能关键词建议
            const allFeatures = [];
            aiTools.forEach(tool => {
                for (const lang of ['ko', 'zh', 'en']) {
                    tool.features[lang].forEach(f => allFeatures.push(f));
                }
            });
            
            allFeatures.forEach(feature => {
                if (feature.toLowerCase().includes(lowerQuery)) {
                    suggestions.add(feature);
                }
            });
            
            return Array.from(suggestions).slice(0, 4);
        }

            const searchResults = document.getElementById('searchResults');
            let html = '';
            
            // 搜索历史
            if (searchHistory.length > 0) {
                html += `
                    <div class="border-b border-gray-700">
                        <div class="p-3 flex justify-between items-center">
                            <span class="text-sm text-gray-400">${translations[currentLang].search.searchHistory}</span>
                            <button class="text-xs text-gray-500 hover:text-red-400" onclick="clearSearchHistory()">${translations[currentLang].search.clearHistory}</button>
                        </div>
                        ${searchHistory.slice(0, 5).map(term => `
                            <div class="p-3 search-result-hover cursor-pointer history-item">
                                <i class="fa fa-clock-o text-gray-400 mr-2"></i>
                                <span>${term}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            
            // 热门搜索
            html += `
                <div>
                    <div class="p-3">
                        <span class="text-sm text-gray-400">${translations[currentLang].search.hotSearches}</span>
                    </div>
                    <div class="px-3 pb-3 flex flex-wrap gap-2">
                        ${hotSearches.map(term => `
                            <span class="px-3 py-1 bg-gray-800 rounded-full text-sm cursor-pointer hover:bg-primary/20 hot-search-item">
                                ${term}
                            </span>
                        `).join('')}
                    </div>
                </div>
            `;
            
            searchResults.innerHTML = html;
            searchResults.classList.remove('hidden');
            
            // 绑定事件
            document.querySelectorAll('.history-item').forEach(item => {
                item.addEventListener('click', () => {
                    document.getElementById('searchInput').value = item.textContent.trim();
                    document.getElementById('searchInput').dispatchEvent(new Event('input'));
                });
            });
            
            document.querySelectorAll('.hot-search-item').forEach(item => {
                item.addEventListener('click', () => {
                    document.getElementById('searchInput').value = item.textContent.trim();
                    document.getElementById('searchInput').dispatchEvent(new Event('input'));
                });
            });
        }

        // 保存搜索历史
        function saveSearchHistory(term) {
            if (!searchHistory.includes(term)) {
                searchHistory.unshift(term);
                searchHistory = searchHistory.slice(0, 10); // 只保存最近10条
                localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
            }
        }

        // 清除搜索历史
        function clearSearchHistory() {
            searchHistory = [];
            localStorage.removeItem('searchHistory');
            showHistoryAndHotSearches();
        }

        // 多维度加权搜索函数
        function searchTools(query) {
            const results = [];
            const lowerQuery = query.toLowerCase().trim();
            
            // 权重配置
            const WEIGHTS = {
                EXACT_NAME: 100,    // 工具名称完全匹配
                PARTIAL_NAME: 80,   // 工具名称部分匹配
                EXACT_FEATURE: 60,  // 功能关键词完全匹配
                SYNONYM_FEATURE: 50,// 同义词匹配
                TAG_MATCH: 40,      // 标签匹配
                RATING_BONUS: 10,   // 评分加分（每0.1分加1分）
                FAVORITE_BONUS: 5   // 收藏数加分
            };

            aiTools.forEach(tool => {
                let score = 0;
                const toolName = tool.name.toLowerCase();
                
                // 1. 工具名称匹配
                if (toolName === lowerQuery) {
                    score += WEIGHTS.EXACT_NAME;
                } else if (toolName.includes(lowerQuery)) {
                    score += WEIGHTS.PARTIAL_NAME;
                }
                
                // 2. 功能关键词匹配（多语言）
                for (const lang of ['ko', 'zh', 'en']) {
                    const features = tool.features[lang].map(f => f.toLowerCase());
                    if (features.some(f => f === lowerQuery)) {
                        score += WEIGHTS.EXACT_FEATURE;
                        break;
                    } else if (features.some(f => f.includes(lowerQuery))) {
                        score += WEIGHTS.EXACT_FEATURE * 0.7;
                        break;
                    }
                }
                
                // 3. 同义词匹配
                if (synonymMap[lowerQuery]) {
                    for (const lang of ['ko', 'zh', 'en']) {
                        const features = tool.features[lang].map(f => f.toLowerCase());
                        if (features.some(f => synonymMap[lowerQuery].map(s => s.toLowerCase()).includes(f))) {
                            score += WEIGHTS.SYNONYM_FEATURE;
                            break;
                        }
                    }
                }
                
                // 4. 工具质量加分
                score += tool.rating * WEIGHTS.RATING_BONUS;
                score += (userBehavior.favorites.filter(id => id === tool.id).length / 10) * WEIGHTS.FAVORITE_BONUS;
                
                if (score > 0) {
                    results.push({ tool, score });
                }
            });
            
            // 如果没有结果，尝试拼写纠错
            if (results.length === 0 && lowerQuery.length > 2) {
                const allToolNames = aiTools.map(t => t.name.toLowerCase());
                const corrections = allToolNames
                    .map(name => ({ name, distance: levenshteinDistance(lowerQuery, name) }))
                    .filter(item => item.distance <= 2) // 最多允许2个字符错误
                    .sort((a, b) => a.distance - b.distance);
                
                if (corrections.length > 0) {
                    const correctedName = corrections[0].name;
                    const correctedTool = aiTools.find(t => t.name.toLowerCase() === correctedName);
                    results.push({ 
                        tool: correctedTool, 
                        score: 50, 
                        isCorrection: true, 
                        correctedQuery: correctedTool.name
                    });
                }
            }
            
            // 按得分降序排序，返回前8个结果
            return results.sort((a, b) => b.score - a.score).slice(0, 8);
        }

        // 渲染搜索结果（支持纠错提示、自动补全、结果内筛选）
        function renderSearchResults(results, suggestions = []) {
            const searchResults = document.getElementById('searchResults');
            
            if (results.length === 0 && suggestions.length === 0) {
                searchResults.innerHTML = `
                    <div class="p-4 text-center text-gray-400">
                        ${translations[currentLang].search.noResults}
                        <div class="mt-2 text-sm">
                            ${translations[currentLang].search.hotSearches}：
                            <span class="text-primary cursor-pointer hot-search-item">ChatGPT</span>、
                            <span class="text-primary cursor-pointer hot-search-item">Midjourney</span>
                        </div>
                    </div>
                `;
            } else {
                let html = '';
                
                // 显示纠错提示
                if (results[0]?.isCorrection) {
                    html += `
                        <div class="p-3 bg-blue-500/10 border-b border-gray-700">
                            <span class="text-gray-400">${translations[currentLang].search.didYouMean}</span>
                            <span class="text-primary font-semibold">${results[0].correctedQuery}</span>
                        </div>
                    `;
                }
                
                // 显示自动补全建议
                if (suggestions.length > 0) {
                    html += `<div class="border-b border-gray-700">`;
                    suggestions.forEach(suggestion => {
                        html += `
                            <div class="p-3 search-result-hover suggestion-item cursor-pointer">
                                <i class="fa fa-search text-gray-400 mr-2"></i>
                                <span>${suggestion}</span>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }
                
                // 显示搜索结果内筛选栏
                if (results.length > 0 && !results[0]?.isCorrection) {
                    html += `
                        <div class="p-3 bg-gray-800/50 border-b border-gray-700 flex flex-wrap gap-2">
                            <span class="text-sm text-gray-400">${translations[currentLang].search.filter}：</span>
                            <button class="text-xs px-2 py-1 rounded border border-gray-600 hover:border-primary filter-result-btn filter-btn-active" data-filter="all">${translations[currentLang].filters.all}</button>
                            <button class="text-xs px-2 py-1 rounded border border-gray-600 hover:border-primary filter-result-btn" data-filter="free">${translations[currentLang].filters.free}</button>
                            <button class="text-xs px-2 py-1 rounded border border-gray-600 hover:border-primary filter-result-btn" data-filter="freemium">${translations[currentLang].filters.freemium}</button>
                            <button class="text-xs px-2 py-1 rounded border border-gray-600 hover:border-primary filter-result-btn" data-filter="paid">${translations[currentLang].filters.paid}</button>
                        </div>
                        <div id="filteredResultsContainer">
                    `;
                    
                    // 初始显示全部结果
                    results.forEach(({ tool }) => {
                        const priceText = translations[currentLang].tool.price[tool.price] || '';
                        const priceClass = {
                            free: 'bg-green-500/20 text-green-400',
                            paid: 'bg-red-500/20 text-red-400',
                            freemium: 'bg-blue-500/20 text-blue-400',
                            coming: 'bg-purple-500/20 text-purple-400'
                        }[tool.price] || 'bg-gray-500/20 text-gray-400';
                        
                        html += `
                            <a href="${tool.url}" target="_blank" class="block p-4 search-result-hover border-b border-gray-700 last:border-b-0 search-result-item" data-price="${tool.price}">
                                <div class="flex justify-between items-center">
                                    <div>
                                        <h4 class="font-semibold text-white flex items-center gap-2">
                                            ${tool.name}
                                            <span class="text-xs px-2 py-0.5 rounded ${priceClass}">${priceText}</span>
                                        </h4>
                                        <p class="text-sm text-gray-400 mt-1">
                                            ⭐ ${tool.rating} · ${tool.features[currentLang].slice(0, 2).join(' · ')}
                                        </p>
                                    </div>
                                    <span class="text-xs text-primary">${translations[currentLang].tool.visit} <i class="fa fa-external-link"></i></span>
                                </div>
                            </a>
                        `;
                    });
                    
                    html += `</div>`;
                } else {
                    // 纠错结果或无筛选时直接显示
                    results.forEach(({ tool }) => {
                        const priceText = translations[currentLang].tool.price[tool.price] || '';
                        const priceClass = {
                            free: 'bg-green-500/20 text-green-400',
                            paid: 'bg-red-500/20 text-red-400',
                            freemium: 'bg-blue-500/20 text-blue-400',
                            coming: 'bg-purple-500/20 text-purple-400'
                        }[tool.price] || 'bg-gray-500/20 text-gray-400';
                        
                        html += `
                            <a href="${tool.url}" target="_blank" class="block p-4 search-result-hover border-b border-gray-700 last:border-b-0 search-result-item">
                                <div class="flex justify-between items-center">
                                    <div>
                                        <h4 class="font-semibold text-white flex items-center gap-2">
                                            ${tool.name}
                                            <span class="text-xs px-2 py-0.5 rounded ${priceClass}">${priceText}</span>
                                        </h4>
                                        <p class="text-sm text-gray-400 mt-1">
                                            ⭐ ${tool.rating} · ${tool.features[currentLang].slice(0, 2).join(' · ')}
                                        </p>
                                    </div>
                                    <span class="text-xs text-primary">${translations[currentLang].tool.visit} <i class="fa fa-external-link"></i></span>
                                </div>
                            </a>
                        `;
                    });
                }
                
                searchResults.innerHTML = html;
                
                // 绑定自动补全建议点击事件
                document.querySelectorAll('.suggestion-item').forEach(item => {
                    item.addEventListener('click', () => {
                        document.getElementById('searchInput').value = item.textContent.trim();
                        document.getElementById('searchInput').dispatchEvent(new Event('input'));
                    });
                });
                
                // 绑定搜索结果内筛选事件
                document.querySelectorAll('.filter-result-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        // 更新按钮状态
                        document.querySelectorAll('.filter-result-btn').forEach(b => {
                            b.classList.remove('filter-btn-active');
                        });
                        e.target.classList.add('filter-btn-active');
                        
                        const filter = e.target.dataset.filter;
                        const resultItems = document.querySelectorAll('#filteredResultsContainer .search-result-item');
                        
                        resultItems.forEach(item => {
                            if (filter === 'all' || item.dataset.price === filter) {
                                item.style.display = 'block';
                            } else {
                                item.style.display = 'none';
                            }
                        });
                    });
                });
                
                // 绑定搜索结果点击事件（保存历史）
                document.querySelectorAll('.search-result-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const term = document.getElementById('searchInput').value.trim();
                        if (term) saveSearchHistory(term);
                    });
                });
            }
            
            searchResults.classList.remove('hidden');
        }

        // 初始化搜索功能（添加防抖、键盘导航）
        function initSearch() {
            const searchInput = document.getElementById('searchInput');
            const searchResults = document.getElementById('searchResults');
            let debounceTimer;
            
            // 防抖处理（300ms延迟）
            searchInput.addEventListener('input', (e) => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    const query = e.target.value.trim().toLowerCase();
                    if (query === '') {
                        showHistoryAndHotSearches();
                        return;
                    }
                    
                    const results = searchTools(query);
                    const suggestions = getAutocompleteSuggestions(query);
                    renderSearchResults(results, suggestions);
                }, 300);
            });
            
            // 键盘导航支持
            searchInput.addEventListener('keydown', (e) => {
                const visibleItems = searchResults.querySelectorAll('.search-result-item, .suggestion-item, .history-item, .hot-search-item');
                if (!visibleItems.length) return;
                
                let currentIndex = Array.from(visibleItems).findIndex(item => 
                    item.classList.contains('highlighted')
                );
                
                switch (e.key) {
                    case 'ArrowDown':
                        e.preventDefault();
                        currentIndex = (currentIndex + 1) % visibleItems.length;
                        break;
                    case 'ArrowUp':
                        e.preventDefault();
                        currentIndex = (currentIndex - 1 + visibleItems.length) % visibleItems.length;
                        break;
                    case 'Enter':
                        e.preventDefault();
                        if (currentIndex >= 0) {
                            visibleItems[currentIndex].click();
                        }
                        return;
                    case 'Escape':
                        searchResults.classList.add('hidden');
                        return;
                }
                
                visibleItems.forEach(item => item.classList.remove('highlighted'));
                if (currentIndex >= 0) {
                    visibleItems[currentIndex].classList.add('highlighted');
                    visibleItems[currentIndex].scrollIntoView({ block: 'nearest' });
                }
            });
            
            // 点击外部关闭搜索结果
            document.addEventListener('click', (e) => {
                if (!e.target.closest('#searchInput') && !e.target.closest('#searchResults')) {
                    searchResults.classList.add('hidden');
                }
            });
        }

        // 移动端菜单按钮
        document.getElementById('mobileMenuBtn').addEventListener('click', () => {
            alert('Mobile menu will be implemented in next version');
        });
    </script>
